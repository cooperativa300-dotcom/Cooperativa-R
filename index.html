const qs = s => document.querySelector(s);
const sol = n => 'S/ '+(Math.round((+n||0)*100)/100).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
const pctF = n => ((+n||0)*100).toFixed(1)+'%';
const getInt = p => (+p.monto)*(+p.interesPct/100)*(+p.meses);
// Mora: 3% mensual sobre el monto por cada mes vencido (mínimo 0)
function getMora(p){
  if(estadoEfectivo(p)!=='VENCIDO') return 0;
  const hoy=new Date(hoyStr());
  const venc=new Date(p.fechaVenc);
  const diasVencido=Math.max(0,Math.round((hoy-venc)/(1000*60*60*24)));
  const mesesVencido=diasVencido/30;
  return +(+p.monto * 0.03 * mesesVencido).toFixed(2);
}
function getTotalConMora(p){
  return +p.monto + getInt(p) + getMora(p);
}
function hoyStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
let _tt; function toast(m,d=2800){const t=qs('#toast');t.textContent=m;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),d);}

// ══════════════════════════════════════════════════════

  {id:12,cliente:'DORGEE',fecha:'2026-05-13',monto:100,interesPct:15,meses:1,fechaVenc:'2026-06-13',estado:'PENDIENTE'},
  {id:13,cliente:'CHICHO',fecha:'2026-05-14',monto:115,interesPct:15,meses:1,fechaVenc:'2026-06-14',estado:'PENDIENTE'},
  {id:14,cliente:'PIERO',fecha:'2026-05-07',monto:150,interesPct:15,meses:1,fechaVenc:'2026-06-07',estado:'PENDIENTE'},

];

// ══════════════════════════════════════════════════════
//  ESTADO GLOBAL
// ══════════════════════════════════════════════════════
let STATE={
  view:'dashboard',
  socios:[...DEFAULT_SOCIOS],
  aportes:DEFAULT_AP.map(a=>({...a})),
  prestamos:DEFAULT_PR.map(p=>({...p})),
  pagos:[],
  nombre:'Cooperativa',
  aiText:'',aiLoading:false,
  calYear:new Date().getFullYear(),
  calMonth:new Date().getMonth(),
  cargando:false,
};

// ══════════════════════════════════════════════════════
//  GOOGLE DRIVE
// ══════════════════════════════════════════════════════
let accessToken=null, driveFileId=null, currentUser=null;
let saveTimer=null, syncInterval=null, syncStatus='offline';
let ultimaMod=null, gapiReady=false, gsiReady=false, tokenClient=null;

function setSyncStatus(s){
  syncStatus=s;
  const dot=qs('.sync-dot'), txt=qs('.sync-txt');
  if(!dot||!txt)return;
  dot.className='sync-dot '+s;
  txt.textContent={ok:'✅ Guardado en Drive',saving:'💾 Guardando...',error:'❌ Error al guardar',offline:'Sin conexión'}[s]||s;
}

async function driveReq(url,opts={}){
  const r=await fetch(url,{...opts,headers:{...opts.headers,'Authorization':'Bearer '+accessToken}});
  return r;
}

async function buscarOCrearArchivo(){
  const q=encodeURIComponent(`name='${CONFIG.FILE_NAME}' and trashed=false`);
  const r=await driveReq(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`);
  const d=await r.json();
  if(d.files&&d.files.length>0) return d.files[0].id;
  const cr=await driveReq('https://www.googleapis.com/drive/v3/files',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name:CONFIG.FILE_NAME,mimeType:'application/json'})
  });
  const f=await cr.json();
  return f.id;
}

async function leerDrive(){
  if(!driveFileId)return;
  const r=await driveReq(`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`);
  if(!r.ok)return;
  try{
    const d=await r.json();
    if(d){
      STATE.socios   =d.socios   ||[...DEFAULT_SOCIOS];
      STATE.aportes  =d.aportes  ||DEFAULT_AP.map(a=>({...a}));
      STATE.prestamos=d.prestamos||DEFAULT_PR.map(p=>({...p}));
      STATE.pagos    =d.pagos    ||[];
      STATE.nombre   =d.nombre   ||'Cooperativa';
    }
  }catch(e){}
}

async function guardarEnDrive(){
  if(!driveFileId||!accessToken)return;
  setSyncStatus('saving');
  try{
    const blob=new Blob([JSON.stringify({
      socios:STATE.socios,aportes:STATE.aportes,
      prestamos:STATE.prestamos,pagos:STATE.pagos,nombre:STATE.nombre,
      ultimaActualizacion:new Date().toISOString(),
      actualizadoPor:currentUser?.email||'usuario'
    },null,2)],{type:'application/json'});
    const r=await driveReq(
      `https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`,
      {method:'PATCH',headers:{'Content-Type':'application/json'},body:blob}
    );
    setSyncStatus(r.ok?'ok':'error');
    if(!r.ok) setTimeout(()=>guardarEnDrive(),5000);
    else{
      // Actualizar timestamp de última modificación conocida
      const m=await driveReq(`https://www.googleapis.com/drive/v3/files/${driveFileId}?fields=modifiedTime`);
      if(m.ok){const md=await m.json();ultimaMod=md.modifiedTime;}
    }
  }catch(e){setSyncStatus('error');setTimeout(()=>guardarEnDrive(),5000);}
}

function guardar(){
  setSyncStatus('saving');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>guardarEnDrive(),1500);
}

// Sync automático cada 30s
async function verificarCambios(){
  if(!driveFileId||!accessToken||syncStatus==='saving')return;
  try{
    const r=await driveReq(`https://www.googleapis.com/drive/v3/files/${driveFileId}?fields=modifiedTime`);
    if(!r.ok)return;
    const{modifiedTime}=await r.json();
    if(ultimaMod&&modifiedTime!==ultimaMod){
      ultimaMod=modifiedTime;
      const vista=STATE.view;
      await leerDrive();
      STATE.view=vista;
      render();
      toast('✨ Datos actualizados desde Drive');
    } else if(!ultimaMod){ ultimaMod=modifiedTime; }
  }catch(e){}
}

// ══════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════
window.onGapiLoad=function(){
  gapi.load('client',async()=>{
    await gapi.client.init({apiKey:CONFIG.API_KEY,discoveryDocs:[]});
    gapiReady=true; if(gsiReady) render();
  });
};

window.onGsiLoad=function(){
  const ok=!CONFIG.CLIENT_ID.includes('TU_CLIENT_ID');
  if(!ok){render();return;}
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:CONFIG.CLIENT_ID,
    scope:CONFIG.SCOPES,
    callback:(resp)=>{
      if(resp.error||!resp.access_token){
        STATE.cargando=false; render();
        toast('❌ Error al iniciar sesión');
        return;
      }
      accessToken=resp.access_token;
      finalizarLogin();
    }
  });
  gsiReady=true; if(gapiReady) render();
};

async function finalizarLogin(){
  STATE.cargando=true; render();
  try{
    const r=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{
      headers:{'Authorization':'Bearer '+accessToken}
    });
    if(!r.ok) throw new Error('Error al obtener usuario: '+r.status);
    currentUser=await r.json();
    driveFileId=await buscarOCrearArchivo();
    await leerDrive();
    STATE.cargando=false; setSyncStatus('ok'); render();
    // Iniciar sync automático
    if(syncInterval) clearInterval(syncInterval);
    syncInterval=setInterval(verificarCambios,30000);
    // Obtener timestamp inicial
    const m=await driveReq(`https://www.googleapis.com/drive/v3/files/${driveFileId}?fields=modifiedTime`);
    if(m.ok){const md=await m.json();ultimaMod=md.modifiedTime;}
  }catch(e){
    console.error(e);
    STATE.cargando=false; accessToken=null; driveFileId=null;
    render(); toast('❌ '+e.message);
  }
}

//  LÓGICA DE NEGOCIO
// ══════════════════════════════════════════════════════
function estadoEfectivo(p){
  if(p.estado==='PAGADO')return 'PAGADO';
  if(p.estado==='VENCIDO')return 'VENCIDO';
  if(p.fechaVenc&&p.fechaVenc<hoyStr())return 'VENCIDO';
  return 'PENDIENTE';
}
function calcular(){
  const{aportes,prestamos,pagos,socios}=STATE;
  // Capital base: solo aportes de tipo NO intereses
  const aportesBase=aportes.filter(a=>a.tipo!=='Intereses distribuidos');
  const aportesInt=aportes.filter(a=>a.tipo==='Intereses distribuidos');
  const totalCap=aportes.reduce((s,a)=>s+(+a.monto),0);
  const totalCapBase=aportesBase.reduce((s,a)=>s+(+a.monto),0);
  const prestAct=prestamos.filter(p=>estadoEfectivo(p)==='PENDIENTE').reduce((s,p)=>s+(+p.monto),0);
  const cajaCap=totalCap-prestAct;
  const intCob=prestamos.filter(p=>estadoEfectivo(p)==='PAGADO').reduce((s,p)=>s+getInt(p),0);
  // Sin reserva — intereses completos se distribuyen
  const dist=intCob;
  // Intereses ya distribuidos (registrados como aportes de intereses)
  const intDistribuidos=aportesInt.reduce((s,a)=>s+(+a.monto),0);
  const intPendDist=Math.max(0,dist-intDistribuidos);
  const socData=socios.map(soc=>{
    const tot=aportesBase.filter(a=>a.socio===soc).reduce((s,a)=>s+(+a.monto),0);
    const pp=totalCapBase>0?tot/totalCapBase:0;
    const gan=dist*pp;
    const intYaDist=aportesInt.filter(a=>a.socio===soc).reduce((s,a)=>s+(+a.monto),0);
    const rec=pagos.filter(p=>p.socio===soc).reduce((s,p)=>s+(+p.monto),0);
    return{socio:soc,totalAp:aportesBase.filter(a=>a.socio===soc).reduce((s,a)=>s+(+a.monto),0),
      pct:pp,ganado:gan,intYaDist,recibido:rec,pendiente:gan-intYaDist};
  });
  return{totalCap,totalCapBase,prestAct,cajaCap,intCob,reserva:0,dist,
    intDistribuidos,intPendDist,
    pagados:prestamos.filter(p=>estadoEfectivo(p)==='PAGADO').length,
    pendientes:prestamos.filter(p=>estadoEfectivo(p)==='PENDIENTE').length,
    vencidos:prestamos.filter(p=>estadoEfectivo(p)==='VENCIDO').length,
    socios:socData};
}
function badge(p){const ef=estadoEfectivo(p);const m={PAGADO:'p',PENDIENTE:'pen',VENCIDO:'v'};return`<span class="badge badge-${m[ef]||'pen'}">${ef}</span>`;}

function renderResumenMensual(){
  const mesesData={};
  STATE.prestamos.forEach(p=>{
    const ef=estadoEfectivo(p);
    if(p.fecha){
      const k=p.fecha.slice(0,7);
      if(!mesesData[k])mesesData[k]={mes:k,prestado:0,cobrado:0,intereses:0,mora:0,nPrestamos:0,nCobrados:0};
      mesesData[k].prestado+= +p.monto;
      mesesData[k].nPrestamos++;
    }
    if(ef==='PAGADO'&&p.fechaVenc){
      const k=p.fechaVenc.slice(0,7);
      if(!mesesData[k])mesesData[k]={mes:k,prestado:0,cobrado:0,intereses:0,mora:0,nPrestamos:0,nCobrados:0};
      mesesData[k].cobrado+= +p.monto;
      mesesData[k].intereses+= getInt(p);
      mesesData[k].nCobrados++;
    }
    if(ef==='VENCIDO'&&p.fechaVenc){
      const k=p.fechaVenc.slice(0,7);
      if(!mesesData[k])mesesData[k]={mes:k,prestado:0,cobrado:0,intereses:0,mora:0,nPrestamos:0,nCobrados:0};
      mesesData[k].mora+= getMora(p);
    }
  });
  const filas=Object.values(mesesData).sort((a,b)=>a.mes<b.mes?-1:1);
  const MESES_N=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const fmtMes=k=>{const[y,m]=k.split('-');return MESES_N[+m-1]+' '+y;};
  const totPrestado=filas.reduce((s,f)=>s+f.prestado,0);
  const totCobrado=filas.reduce((s,f)=>s+f.cobrado,0);
  const totInt=filas.reduce((s,f)=>s+f.intereses,0);
  const totMora=filas.reduce((s,f)=>s+f.mora,0);

  if(filas.length===0) return `<div style="padding:20px"><p style="font-size:18px;font-weight:600;margin-bottom:3px">📆 Resumen Mensual</p><div class="card" style="text-align:center;padding:50px 20px"><div style="font-size:36px;margin-bottom:12px">📆</div><p style="font-weight:600;color:var(--text2)">Sin datos por mes aún</p></div></div>`;

  const kpis = [
    ['Total Prestado', sol(totPrestado), 'Suma de todos los préstamos', 'var(--navy)'],
    ['Total Cobrado', sol(totCobrado), 'Capital recuperado', 'var(--teal)'],
    ['Intereses Generados', sol(totInt), 'De préstamos cobrados', 'var(--green)'],
    ['Mora Acumulada', sol(totMora), 'Préstamos vencidos', 'var(--red)'],
  ];

  const filasHtml = filas.map((f,i)=>`
    <tr class="${i%2===0?'row-even':'row-alt'}">
      <td class="b" style="color:var(--navy)">${fmtMes(f.mes)}</td>
      <td class="r g">${f.nPrestamos} préstamos</td>
      <td class="r mono">${sol(f.prestado)}</td>
      <td class="r g">${f.nCobrados} cobrados</td>
      <td class="r mono" style="color:var(--teal)">${sol(f.cobrado)}</td>
      <td class="r b mono" style="color:var(--green)">${sol(f.intereses)}</td>
      <td class="r mono" style="color:${f.mora>0?'var(--red)':'var(--text3)'}">${f.mora>0?sol(f.mora):'-'}</td>
      <td class="r b mono" style="color:var(--gold)">${sol(f.intereses+f.mora)}</td>
    </tr>`).join('');

  return `<div style="padding:20px">
    <p style="font-size:18px;font-weight:600;margin-bottom:3px">📆 Resumen Mensual</p>
    <p style="font-size:12px;color:var(--text3);margin-bottom:18px">Actividad por mes</p>
    <div class="g4" style="margin-bottom:16px">
      ${kpis.map(([t,v,s,col])=>`<div class="kpi" style="border-top:3px solid ${col}">
        <p style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px">${t}</p>
        <p style="font-size:18px;font-weight:600;font-family:var(--mono);margin-bottom:4px">${v}</p>
        <p style="font-size:11px;color:var(--text3)">${s}</p>
      </div>`).join('')}
    </div>
    <div class="card"><div style="overflow-x:auto"><table>
      <thead><tr><th>Mes</th><th class="r">Préstamos</th><th class="r">Monto Prestado</th><th class="r">Cobrados</th><th class="r">Capital Recuperado</th><th class="r">Intereses</th><th class="r">Mora</th><th class="r">Ganancia</th></tr></thead>
      <tbody>${filasHtml}</tbody>
      <tfoot><tr class="tfoot-row">
        <td>TOTAL</td>
        <td class="r">${STATE.prestamos.length}</td>
        <td class="r mono">${sol(totPrestado)}</td>
        <td class="r">${STATE.prestamos.filter(p=>estadoEfectivo(p)==='PAGADO').length}</td>
        <td class="r mono">${sol(totCobrado)}</td>
        <td class="r mono" style="color:#4ade80">${sol(totInt)}</td>
        <td class="r mono" style="color:#f87171">${sol(totMora)}</td>
        <td class="r mono" style="color:#D4AF37">${sol(totInt+totMora)}</td>
      </tr></tfoot>
    </table></div></div>
  </div>`;
}
const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
function renderCalendario(){
  const hoy=hoyStr(),year=STATE.calYear,month=STATE.calMonth;
  const pend=STATE.prestamos.filter(p=>estadoEfectivo(p)==='PENDIENTE');
  const venc=STATE.prestamos.filter(p=>estadoEfectivo(p)==='VENCIDO');
  const byDate={};[...pend,...venc].forEach(p=>{if(!byDate[p.fechaVenc])byDate[p.fechaVenc]=[];byDate[p.fechaVenc].push(p);});
  const first=new Date(year,month,1).getDay();
  const dias=new Date(year,month+1,0).getDate();
  const prev=new Date(year,month,0).getDate();
  let cells=[];
  for(let i=first-1;i>=0;i--)cells.push({d:prev-i,m:month-1,other:true});
  for(let d=1;d<=dias;d++)cells.push({d,m:month,other:false});
  let rem=cells.length%7;if(rem)for(let d=1;d<=7-rem;d++)cells.push({d,m:month+1,other:true});
  const rows=[];for(let r=0;r<cells.length/7;r++)rows.push(cells.slice(r*7,r*7+7));
  const proximos=pend.slice().sort((a,b)=>a.fechaVenc<b.fechaVenc?-1:1).slice(0,12);
  return`<div style="padding:20px">
    <p style="font-size:18px;font-weight:600;margin-bottom:3px">📅 Calendario de Préstamos</p>
    <p style="font-size:12px;color:var(--text3);margin-bottom:18px">Vencimientos pendientes</p>
    <div style="display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start">
      <div class="card card-pad">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <div style="display:flex;align-items:center;gap:10px">
            <button id="cal-prev" class="cal-nav">‹</button>
            <span style="font-size:15px;font-weight:600;min-width:180px;text-align:center">${MESES[month]} ${year}</span>
            <button id="cal-next" class="cal-nav">›</button>
          </div>
          <button class="btn btn-outline btn-sm" id="cal-hoy">Hoy</button>
        </div>
        <div class="cal-grid">
          ${['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'].map(d=>`<div class="cal-head-cell">${d}</div>`).join('')}
          ${rows.map(row=>row.map(cell=>{
            const yy=cell.m<0?year-1:cell.m>11?year+1:year;
            const mm=((cell.m%12)+12)%12;
            const ds=yy+'-'+String(mm+1).padStart(2,'0')+'-'+String(cell.d).padStart(2,'0');
            const isToday=ds===hoy; const evs=byDate[ds]||[];
            return`<div class="cal-cell${cell.other?' other-month':''}${isToday?' today':''}${evs.length?' has-events':''}">
              <div class="cal-day-num">${cell.d}</div>
              ${evs.slice(0,3).map(p=>{const ef=estadoEfectivo(p);return`<span class="cal-event${ef==='VENCIDO'?' venc-pasado':ds===hoy?' venc-hoy':''}" title="${p.cliente}">${p.cliente}</span>`;}).join('')}
              ${evs.length>3?`<span style="font-size:9px;color:var(--text3)">+${evs.length-3}</span>`:''}
            </div>`;}).join('')).join('')}
        </div>
        <div style="display:flex;gap:16px;margin-top:10px;flex-wrap:wrap">
          ${[['#FFE0B2','1px solid var(--amb)','Pendiente'],['#FFEBEE','1px solid var(--red)','Vencido'],['#EEF4FF','2px solid var(--navy2)','Hoy']].map(([bg,bd,l])=>
          `<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3)"><div style="width:10px;height:10px;border-radius:2px;background:${bg};border:${bd}"></div>${l}</div>`).join('')}
        </div>
      </div>
      <div class="card card-pad">
        <p style="font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px">Próximos vencimientos</p>
        ${proximos.length===0?`<p style="font-size:12px;color:var(--text3);text-align:center;padding:20px 0">Sin pendientes 🎉</p>`:`
        ${proximos.map(p=>{
          const d2=new Date(p.fechaVenc);
          const dias2=Math.round((new Date(p.fechaVenc)-new Date(hoy))/(1000*60*60*24));
          const cls=dias2===0?'venc-hoy':dias2<0?'venc-pasado':'';
          return`<div class="upcoming-item ${cls}">
            <div class="upcoming-date-box"><div class="upcoming-date-day">${d2.getUTCDate()}</div><div class="upcoming-date-mon">${MESES[d2.getUTCMonth()].slice(0,3)}</div></div>
            <div style="flex:1;min-width:0">
              <p style="font-size:12.5px;font-weight:600">${p.cliente}</p>
              <p style="font-size:11px;color:var(--text3)">${sol(+p.monto+getInt(p))} · <span style="color:${dias2<=3?'var(--amb)':'var(--text3)'}">${dias2===0?'HOY':`${dias2}d`}</span></p>
            </div>
            <button class="btn btn-green btn-sm" data-pagar="${p.id}">✓</button>
          </div>`;}).join('')}`}
        ${venc.length>0?`<div style="margin-top:14px"><p style="font-size:11px;font-weight:600;color:var(--red);margin-bottom:8px">⚠️ Vencidos (${venc.length})</p>
          ${venc.map(p=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:#FFF5F5;border-radius:8px;margin-bottom:4px;border:1px solid #EF9A9A">
            <div><p style="font-size:12px;font-weight:600;color:var(--red)">${p.cliente}</p>
            <p style="font-size:10.5px;color:#999">${p.fechaVenc} · ${sol(+p.monto+getInt(p))}</p></div>
            <button class="btn btn-green btn-sm" data-pagar="${p.id}">✓ Cobrado</button>
          </div>`).join('')}</div>`:''}
      </div>
    </div>
  </div>`;
}

function render(){
  const root=qs('#root');
  if(STATE.cargando){root.innerHTML=renderCargando();return;}
  if(!accessToken){root.innerHTML=renderLogin();return;}
  const st=calcular();
  let html=renderHeader(st)+'<div id="content">';
  if(STATE.view==='dashboard')     html+=renderDashboard(st);
  else if(STATE.view==='prestamos')     html+=renderPrestamos();
  else if(STATE.view==='aportes')       html+=renderAportes();
  else if(STATE.view==='distribucion')  html+=renderDistribucion(st);
  else if(STATE.view==='pagos')         html+=renderPagos(st);
  else if(STATE.view==='resumen')        html+=renderResumenMensual();
  else if(STATE.view==='calendario')    html+=renderCalendario();
  html+='</div>';
  root.innerHTML=html;
  bindEvents(st);
}

function distribuirIntereses(){
  const st=calcular();
  if(st.intPendDist<=0){toast('✅ No hay intereses pendientes de distribuir');return;}
  if(!confirm(`¿Distribuir ${sol(st.intPendDist)} entre los ${STATE.socios.length} socios como aportes de intereses?`))return;
  const fecha=hoyStr();
  const nuevosAportes=st.socios
    .filter(s=>s.pendiente>0)
    .map(s=>({
      id:Date.now()+Math.random(),
      fecha,
      socio:s.socio,
      monto:+s.pendiente.toFixed(2),
      tipo:'Intereses distribuidos',
      concepto:'Distribución automática de intereses'
    }));
  STATE.aportes=[...STATE.aportes,...nuevosAportes];
  guardar();render();
  toast(`✅ Intereses distribuidos entre ${nuevosAportes.length} socios`);
}

function bindEvents(st){
  qs('#btn-ai')?.addEventListener('click',()=>getAI(st));
  qs('#close-ai')?.addEventListener('click',()=>{STATE.aiText='';render();});
  qs('#btn-export')?.addEventListener('click',exportarExcel);
  qs('#btn-config')?.addEventListener('click',()=>abrirModal('config'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',()=>{STATE.view=b.dataset.view;render();}));
  qs('#btn-distribuir')?.addEventListener('click',()=>distribuirIntereses());
  qs('#btn-np')?.addEventListener('click',()=>abrirModal('prestamo'));
  qs('#btn-na')?.addEventListener('click',()=>abrirModal('aporte'));
  qs('#btn-npago')?.addEventListener('click',()=>abrirModal('pago',null,st));
  qs('#cal-prev')?.addEventListener('click',()=>{STATE.calMonth--;if(STATE.calMonth<0){STATE.calMonth=11;STATE.calYear--;}render();});
  qs('#cal-next')?.addEventListener('click',()=>{STATE.calMonth++;if(STATE.calMonth>11){STATE.calMonth=0;STATE.calYear++;}render();});
  qs('#cal-hoy')?.addEventListener('click',()=>{const n=new Date();STATE.calYear=n.getFullYear();STATE.calMonth=n.getMonth();render();});
  document.querySelectorAll('[data-pagar]').forEach(b=>b.addEventListener('click',()=>{STATE.prestamos=STATE.prestamos.map(p=>p.id==b.dataset.pagar?{...p,estado:'PAGADO'}:p);guardar();toast('✅ Cobrado');render();}));
  document.querySelectorAll('[data-vencer]').forEach(b=>b.addEventListener('click',()=>{STATE.prestamos=STATE.prestamos.map(p=>p.id==b.dataset.vencer?{...p,estado:'VENCIDO'}:p);guardar();toast('⚠️ Vencido');render();}));
  document.querySelectorAll('[data-del-pr]').forEach(b=>b.addEventListener('click',()=>{if(!confirm('¿Eliminar?'))return;STATE.prestamos=STATE.prestamos.filter(p=>p.id!=b.dataset.delPr);guardar();toast('🗑️ Eliminado');render();}));
  document.querySelectorAll('[data-del-ap]').forEach(b=>b.addEventListener('click',()=>{if(!confirm('¿Eliminar?'))return;STATE.aportes=STATE.aportes.filter(a=>a.id!=b.dataset.delAp);guardar();toast('🗑️ Eliminado');render();}));
  document.querySelectorAll('[data-del-pg]').forEach(b=>b.addEventListener('click',()=>{if(!confirm('¿Eliminar?'))return;STATE.pagos=STATE.pagos.filter(p=>p.id!=b.dataset.delPg);guardar();toast('🗑️ Eliminado');render();}));
  document.querySelectorAll('[data-edit-pr]').forEach(b=>b.addEventListener('click',()=>{const p=STATE.prestamos.find(x=>x.id==b.dataset.editPr);if(p)abrirModal('prestamo',p);}));
  document.querySelectorAll('[data-edit-ap]').forEach(b=>b.addEventListener('click',()=>{const a=STATE.aportes.find(x=>x.id==b.dataset.editAp);if(a)abrirModal('aporte',a);}));
  document.querySelectorAll('[data-edit-pg]').forEach(b=>b.addEventListener('click',()=>{const p=STATE.pagos.find(x=>x.id==b.dataset.editPg);if(p)abrirModal('pago',p,calcular());}));
  document.querySelectorAll('[data-ver-comp]').forEach(b=>b.addEventListener('click',()=>{
    const p=STATE.prestamos.find(x=>x.id==b.dataset.verComp);
    if(p?.comprobante) verImagen(p.comprobante,'Comprobante — '+p.cliente);
  }));
  document.querySelectorAll('[data-ver-comp-pg]').forEach(b=>b.addEventListener('click',()=>{
    const p=STATE.pagos.find(x=>x.id==b.dataset.verCompPg);
    if(p?.comprobante) verImagen(p.comprobante,'Comprobante de pago — '+p.socio);
  }));
}

let modalEl=null;
function cerrarModal(){if(modalEl){modalEl.remove();modalEl=null;}}
function abrirModal(tipo,datos=null,st=null){
  cerrarModal();modalEl=document.createElement('div');modalEl.className='modal-overlay';
  if(tipo==='prestamo') modalEl.innerHTML=htmlModalPrestamo(datos);
  else if(tipo==='aporte') modalEl.innerHTML=htmlModalAporte(datos);
  else if(tipo==='pago')   modalEl.innerHTML=htmlModalPago(datos,st||calcular());
  else if(tipo==='config') modalEl.innerHTML=htmlModalConfig();
  document.body.appendChild(modalEl);
  modalEl.addEventListener('click',e=>{if(e.target===modalEl)cerrarModal();});
  modalEl.querySelector('.modal-close')?.addEventListener('click',cerrarModal);
  if(tipo==='prestamo') bindModalPrestamo(datos);
  else if(tipo==='aporte') bindModalAporte(datos);
  else if(tipo==='pago')   bindModalPago(datos,st||calcular());
  else if(tipo==='config') bindModalConfig();
}

function htmlModalPrestamo(d){const e=d||{};
  return`<div class="modal-box"><div class="modal-head"><span class="modal-title">${d?'✏️ Editar préstamo':'＋ Nuevo préstamo'}</span><button class="modal-close">✕</button></div>
  <div class="modal-body">
    <label class="field-lbl">Cliente</label><input id="m-cliente" value="${e.cliente||''}" placeholder="Nombre del cliente" style="margin-bottom:10px">
    <div class="g2 mb10"><div><label class="field-lbl">Fecha del préstamo</label><input type="date" id="m-fecha" value="${e.fecha||''}"></div>
    <div><label class="field-lbl">Fecha de vencimiento</label><input type="date" id="m-venc" value="${e.fechaVenc||''}"></div></div>
    <div class="g3 mb10">

function bindModalPrestamo(datos){
  const upd=()=>{const mo=+qs('#m-monto')?.value||0,ip=+qs('#m-int')?.value||0,ms=+qs('#m-meses')?.value||1;const i=mo*(ip/100)*ms;const p=qs('#m-preview');if(mo>0&&p){p.style.display='block';p.innerHTML=`💡 Interés: <strong>${sol(i)}</strong> · Total: <strong>${sol(mo+i)}</strong>`;}};
  ['m-monto','m-int','m-meses'].forEach(id=>qs('#'+id)?.addEventListener('input',upd));upd();
  qs('#m-submit')?.addEventListener('click',()=>{
    const cliente=qs('#m-cliente')?.value?.trim(),fecha=qs('#m-fecha')?.value;
    const monto=+qs('#m-monto')?.value,interesPct=+qs('#m-int')?.value;
    const meses=+qs('#m-meses')?.value||1,fechaVenc=qs('#m-venc')?.value,estado=qs('#m-estado')?.value;
    if(!cliente){alert('Ingresa el cliente');return;}if(!fecha){alert('Ingresa la fecha');return;}if(!monto||monto<=0){alert('Ingresa un monto válido');return;}
    const fileInput=qs('#m-comp');
    const guardarConComp=(comp)=>{
      if(datos) STATE.prestamos=STATE.prestamos.map(p=>p.id===datos.id?{...p,cliente,fecha,monto,interesPct,meses,fechaVenc,estado,comprobante:comp!==undefined?comp:p.comprobante}:p);
      else STATE.prestamos=[...STATE.prestamos,{id:Date.now(),cliente,fecha,monto,interesPct,meses,fechaVenc,estado,comprobante:comp||null}];
      guardar();cerrarModal();render();toast(datos?'✅ Actualizado':'✅ Registrado');
    };
    if(fileInput?.files?.length>0){
      const reader=new FileReader();
      reader.onload=e=>guardarConComp(e.target.result);
      reader.readAsDataURL(fileInput.files[0]);
    } else { guardarConComp(undefined); }
  });
  qs('#m-del-comp')?.addEventListener('click',()=>{
    if(datos) STATE.prestamos=STATE.prestamos.map(p=>p.id===datos.id?{...p,comprobante:null}:p);
    guardar();cerrarModal();abrirModal('prestamo',STATE.prestamos.find(x=>x.id===datos?.id));
  });
}

function bindModalConfig(){
  qs('#m-nombre')?.addEventListener('input',e=>{STATE.nombre=e.target.value;guardar();});
  qs('#m-add-socio')?.addEventListener('click',()=>{
    const val=qs('#m-nuevo-socio')?.value?.trim().toUpperCase();
    if(!val){alert('Escribe el nombre');return;}if(STATE.socios.includes(val)){toast('⚠️ Ya existe');return;}
    STATE.socios=[...STATE.socios,val];guardar();
    const l=modalEl?.querySelector('#socios-lista');if(l)l.innerHTML=STATE.socios.map(s=>`<span class="socio-tag">${s}<button data-del-socio="${s}">×</button></span>`).join('');
    qs('#m-nuevo-socio').value='';bindDelSocios();toast('✅ Socio agregado');
  });
  bindDelSocios();
  qs('#m-reset')?.addEventListener('click',()=>{if(!confirm('¿Restaurar datos originales?'))return;STATE.socios=[...DEFAULT_SOCIOS];STATE.aportes=DEFAULT_AP.map(a=>({...a}));STATE.prestamos=DEFAULT_PR.map(p=>({...p}));STATE.pagos=[];STATE.nombre='Cooperativa';guardar();cerrarModal();render();toast('✅ Restaurado');});
  qs('#m-limpiar')?.addEventListener('click',()=>{if(!confirm('⚠️ ¿Borrar TODO?'))return;STATE.aportes=[];STATE.prestamos=[];STATE.pagos=[];STATE.nombre='Cooperativa';STATE.socios=[...DEFAULT_SOCIOS];guardar();cerrarModal();render();toast('🗑️ Sistema limpio');});
}
function bindDelSocios(){
  modalEl?.querySelectorAll('[data-del-socio]').forEach(b=>b.addEventListener('click',()=>{
    const s=b.dataset.delSocio;if(STATE.aportes.some(a=>a.socio===s)){toast('⚠️ Tiene aportes');return;}
    if(!confirm(`¿Eliminar ${s}?`))return;STATE.socios=STATE.socios.filter(x=>x!==s);guardar();
    const l=modalEl?.querySelector('#socios-lista');if(l)l.innerHTML=STATE.socios.map(s=>`<span class="socio-tag">${s}<button data-del-socio="${s}">×</button></span>`).join('');
    bindDelSocios();toast('🗑️ Eliminado');
  }));
}

function exportarExcel(){
  const st=calcular(),hoy=new Date().toLocaleDateString('es-PE'),wb=XLSX.utils.book_new();
  const wsR=XLSX.utils.aoa_to_sheet([[STATE.nombre],[`Generado: ${hoy}`],[],['RESUMEN'],['Capital Total',st.totalCap],['Caja',st.cajaCap],['Intereses Cobrados',st.intCob],['Reserva 10%',st.reserva],['Utilidades Distribuibles',st.dist],[],['POR SOCIO'],['Socio','Aportó','%','Corresponde','Recibió','Pendiente'],...st.socios.map(s=>[s.socio,s.totalAp,+(s.pct*100).toFixed(2),+s.ganado.toFixed(2),+s.recibido.toFixed(2),+s.pendiente.toFixed(2)])]);
  XLSX.utils.book_append_sheet(wb,wsR,'Resumen');
  const wsPr=XLSX.utils.aoa_to_sheet([['#','Cliente','Fecha','Monto','Interés%','Total','Vencimiento','Estado'],...STATE.prestamos.slice().sort((a,b)=>a.fechaVenc<b.fechaVenc?-1:1).map((p,i)=>[i+1,p.cliente,p.fecha,+p.monto,+p.interesPct,+(+p.monto+getInt(p)).toFixed(2),p.fechaVenc,estadoEfectivo(p)])]);
  XLSX.utils.book_append_sheet(wb,wsPr,'Préstamos');
  const pen=STATE.prestamos.filter(p=>estadoEfectivo(p)==='PENDIENTE').slice().sort((a,b)=>a.fechaVenc<b.fechaVenc?-1:1);
  const wsPen=XLSX.utils.aoa_to_sheet([['PENDIENTES'],[],['#','Cliente','Monto','Total','Vencimiento','Días'],...pen.map((p,i)=>{const d=Math.round((new Date(p.fechaVenc)-new Date(hoyStr()))/(1000*60*60*24));return[i+1,p.cliente,+p.monto,+(+p.monto+getInt(p)).toFixed(2),p.fechaVenc,d];})]);
  XLSX.utils.book_append_sheet(wb,wsPen,'Pendientes');
  const wsAp=XLSX.utils.aoa_to_sheet([['#','Fecha','Socio','Monto','Tipo','Concepto'],...STATE.aportes.slice().sort((a,b)=>a.fecha<b.fecha?-1:1).map((a,i)=>[i+1,a.fecha,a.socio,+a.monto,a.tipo,a.concepto||''])]);
  XLSX.utils.book_append_sheet(wb,wsAp,'Aportes');
  XLSX.writeFile(wb,`cooperativa_${hoyStr()}.xlsx`);toast('📊 Excel exportado');
}

async function getAI(st){
  STATE.aiLoading=true;render();
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:700,messages:[{role:"user",
        content:`Eres contador experto en cooperativas en Perú. Analiza:\nCapital: ${sol(st.totalCap)} | Caja: ${sol(st.cajaCap)} | Prestado: ${sol(st.prestAct)}\nIntereses: ${sol(st.intCob)} | Distribuible: ${sol(st.dist)}\nPréstamos: ${st.pagados} pagados, ${st.pendientes} pendientes, ${st.vencidos} vencidos\n${st.socios.map(s=>`${s.socio}: ${sol(s.totalAp)} (${pctF(s.pct)}), pendiente ${sol(s.pendiente)}`).join(' | ')}\nDa 3 observaciones concretas en español.`}]})});
    const d=await res.json();STATE.aiText=d.content[0].text;
  }catch(e){STATE.aiText="Error de conexión.";}
  STATE.aiLoading=false;render();
}
